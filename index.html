<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ahsaan</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    padding:20px;
}

h1{
    font-size:40px;
}

p{
    font-size:20px;
}

button{
    padding:12px 25px;
    border:none;
    background:#ff4081;
    color:white;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#e73370;
}

@media (max-width:600px){
    h1{font-size:30px;}
    p{font-size:18px;}
}
</style>
</head>

<body>

<div class="container">
<h1>🎉 Happy Birthday Ahsaan! 🎂</h1>
<p>Dear Ahsaan, Wishing you a day full of happiness and a year full of joy! 🎈</p>
<button onclick="startConfetti()">Celebrate 🎊</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function startConfetti(){
    confetti({
        particleCount:200,
        spread:120,
        origin:{ y:0.6 }
    });
}
</script>

</body>
</html>
